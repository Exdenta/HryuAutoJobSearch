# Job-search filters — example configuration
# Edit to match your target role, stack, and location.
# ---------------------------------------------------------------------------
#
# ⚠️ MATCHING IS AI-DRIVEN.
# The keyword / title / company / seniority / salary fields below are kept
# for historical reference only — the orchestrator no longer enforces them.
# Every posting fetched from every source (LinkedIn, HN, remoteok, remotive,
# weworkremotely, curated boards, web_search) flows into a single Claude
# Haiku call that scores 0-5 against the candidate's resume + preferences.
# Jobs are dropped via `ai_min_match_score` (see below) + the user's ⭐
# floor, NOT via substring matches in this file.
#
# If you want to re-enable the legacy keyword gate, edit `post_filter` in
# skill/job-search/scripts/search_jobs.py — it's been deliberately turned
# into a pass-through.
# ---------------------------------------------------------------------------

# [DEPRECATED — IGNORED] Role keywords. Kept for migration reference.
keywords:
  - "frontend"
  - "front-end"
  - "front end"
  - "react"
  - "typescript"
  - "vue"
  - "ui engineer"
  - "web developer"

# [DEPRECATED — IGNORED] AND-logic required keywords.
required_keywords: []

# [DEPRECATED — IGNORED] Title-level allow-list. Historically kept backend
# roles out of a frontend feed. The AI now reads the candidate's preferences
# and does the same job holistically.
title_must_match:
  - "frontend"
  - "front-end"
  - "front end"
  - "react"
  - "vue"
  - "angular"
  - "svelte"
  - "ui engineer"
  - "ui developer"
  - "web developer"
  - "fullstack"
  - "full-stack"
  - "full stack"
  - "javascript"
  - "typescript"

# [DEPRECATED — IGNORED] Title-level veto.
title_exclude:
  - "backend"
  - "back-end"
  - "back end"
  - "data engineer"
  - "devops"
  - "sre"
  - "security engineer"
  - "qa engineer"
  - "ios"
  - "android"
  - "mobile"
  - "content"
  - "manager"
  - "director"
  - "head of"
  - "principal"
  - "staff"
  - "lead"
  - "vp"

# [DEPRECATED — IGNORED] Body-text veto.
exclude_keywords:
  - "bootcamp"
  - "unpaid"
  - "solidity"
  - "ios developer"
  - "android developer"
  - "embedded engineer"
  - "ruby on rails"
  - "salesforce developer"
  - "drupal"
  - "wordpress developer"
  - "principal engineer"
  - "staff engineer"
  - "head of engineering"
  - "engineering manager"
  - "director of engineering"

# [DEPRECATED — IGNORED] Seniority gate.
seniority: any

# [DEPRECATED — IGNORED] Location allow-list.
locations:
  - "remote"
  - "bilbao"
  - "basque"
  - "euskadi"
  - "país vasco"
  - "pais vasco"
  - "spain"
  - "españa"
  - "europe"
  - "european union"
  - "eu"
  - "emea"

# [DEPRECATED — IGNORED] Remote preference.
remote: any

# [DEPRECATED — IGNORED] Salary floor / required-salary gate.
salary:
  min_usd: 0
  drop_if_unknown: false

# [DEPRECATED — IGNORED] Company veto.
exclude_companies:
  - "Crossover"
  - "Turing"
  - "Toptal"

# How many hours back to look. HN threads are softened ×30 internally.
max_age_hours: 48

# Per-source and global caps — readable digest size.
max_per_source: 12
max_total: 40

# Source toggles. LinkedIn is enabled by default because EU frontend roles
# are heavily concentrated there. Indeed is left off — RSS coverage is weak in ES.
sources:
  hackernews: true           # monthly "Who is hiring?" — often EU remote
  remoteok: true             # https://remoteok.com/api
  remotive: true             # https://remotive.com/api/remote-jobs
  weworkremotely: true       # RSS — programming/frontend categories
  indeed: false
  linkedin: true             # public jobs-guest endpoint; see source_notes.md
  # Curated boards — no public API, so we delegate the fetch-and-extract step
  # to a Claude agent via the `claude` CLI at run time. Each enabled board costs
  # ~1 Claude request per run. Disabled by default until you've verified the
  # CLI is installed and logged in on the machine that runs the cron.
  remocate: false            # https://www.remocate.app — global remote + relocation
  wantapply: false           # https://wantapply.com — curated remote + relocation
  remoterocketship: false    # https://www.remoterocketship.com — public listings

  # Open-web discovery — a Claude sub-agent runs WebSearch + WebFetch to find
  # postings on company career pages, ATS systems (greenhouse / lever / ashby /
  # workable / personio / recruitee / workday), regional boards, and anywhere
  # else a search engine surfaces. Runs PER-USER so the sub-agent can shape its
  # queries around that user's exact /prefs wording — expect ~60-120 seconds
  # per recipient with free_text. No-op for users who haven't typed a /prefs
  # description. Requires the `claude` CLI installed and logged in.
  web_search: true

# Per-scrape timeout (seconds) for the AI-delegated curated boards above.
ai_scrape_timeout_s: 180

# Dedicated timeout for the web_search sub-agent. It usually needs more wall
# clock than a single-domain scrape because it runs multiple WebSearch +
# WebFetch calls. Falls back to `ai_scrape_timeout_s` if omitted.
ai_web_search_timeout_s: 300

# ---------------------------------------------------------------------------
# Resume-aware enrichment
# ---------------------------------------------------------------------------
# When true, run ONE batched Claude CLI call per user per run that, for each
# new posting, returns:
#   - match_score   (0-5)
#   - why_match     (1-2 sentences that name specific overlaps with the resume)
#   - key_details   (stack, seniority, remote_policy, location, salary,
#                    visa_support, language, standout)
# The digest card renders a ⭐ score bar and the extra lines in-place. Jobs
# are sorted highest-score-first so the strongest fits are at the top.
# If the `claude` CLI isn't installed / times out, we fall back to the plain
# card (no score, no why-match) and still send the digest.
ai_enrich: true
ai_enrich_timeout_s: 240

# AI-matching floor. Applied when a user hasn't set their own ⭐ min-match
# floor via the bot button. Because there's no keyword pre-filter upstream
# (every posting goes straight into the Haiku call), this is what keeps the
# digest clean — anything Claude scored below this gets dropped.
# Scale:
#   0 = disable default floor (user must opt-in via the ⭐ button)
#   1 = drop only hard rejects (score=0, "clearly wrong fit")
#   2 = also drop "poor" (score=1) [Recommended default]
#   3 = keep only "OK / acceptable stretch" and above
ai_min_match_score: 2

# LinkedIn search params. We run ONE query per day to stay polite.
# The broad `q` plus the global `keywords` filter narrows results after fetch.
linkedin:
  q: "frontend developer"
  geo: "Spain"          # covers Bilbao + other ES cities + ES-listed remote roles
  f_TPR: "r86400"       # past 24h

# Indeed params — unused while disabled, but ready if you turn it on later.
indeed:
  q: "frontend developer react"
  l: "Bilbao, Spain"
  fromage: 1

# Message formatting
message:
  parse_mode: "MarkdownV2"
  group_by_source: true
  include_snippet: true
  snippet_chars: 260
  # Send a "nothing new" ping on empty days so the chat stays alive.
  quiet_if_empty: false
